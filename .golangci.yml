version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck     # Check for unchecked errors
    - govet        # Vet examines Go source code
    - ineffassign  # Detect ineffectual assignments
    - staticcheck  # Advanced Go linter (includes gosimple checks)
    - unused       # Check for unused constants, variables, functions and types

linters-settings:
  errcheck:
    # Check for unchecked errors in type assertions
    check-type-assertions: true
    # Check for unchecked errors in blank assignments
    check-blank: false  # Allow _ = someFunc() pattern

issues:
  # Exclude autogenerated files
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
      text: "Error return value of.*is not checked"
  
  # Maximum issues count per one linter
  max-issues-per-linter: 0
  
  # Maximum count of issues with the same text
  max-same-issues: 0

output:
  # colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  formats:
    colored-line-number: stdout
  print-issued-line: true
  print-linter-name: true